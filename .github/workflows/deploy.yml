name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        id: deploy
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          DEPLOY_URL=$(npx ait deploy \
            --api-key ${{ secrets.AIT_API_KEY }} \
            --scheme-only \
            -m "[${{ github.ref_name }}] $COMMIT_MSG")
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Notify Discord (success)
        if: success()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ 배포 성공",
                "color": 5763719,
                "fields": [
                  {
                    "name": "앱 링크",
                    "value": "`'"${{ steps.deploy.outputs.deploy_url }}"'`",
                    "inline": false
                  },
                  {
                    "name": "커밋",
                    "value": "[`'"${GITHUB_SHA::7}"'`]('"${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"')",
                    "inline": true
                  },
                  {
                    "name": "배포자",
                    "value": "${{ github.actor }}",
                    "inline": true
                  }
                ],
                "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
              }]
            }'

      - name: Notify Discord (failure)
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "❌ 배포 실패",
                "color": 15548997,
                "fields": [
                  {
                    "name": "커밋",
                    "value": "[`'"${{ github.sha }}"'`]('"${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"')",
                    "inline": true
                  },
                  {
                    "name": "배포자",
                    "value": "${{ github.actor }}",
                    "inline": true
                  },
                  {
                    "name": "워크플로우",
                    "value": "[로그 보기]('"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"')",
                    "inline": true
                  }
                ],
                "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
              }]
            }'
